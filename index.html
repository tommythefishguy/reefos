<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReefOS</title>
<style>
body{background:#020814;color:white;font-family:sans-serif}
.card{padding:15px;border:1px solid #0af;border-radius:10px;margin:10px}
input,textarea{width:100%;padding:8px;margin:5px 0;background:#000;color:#fff;border:1px solid #0af}
button{padding:10px;background:#0af;border:none;color:#000;font-weight:bold;width:100%}
</style>
</head>
<body>

<div class="card">
<h2>Add Water Test</h2>

<label>Date</label>
<input id="date" type="date">

<div id="testFields"></div>

<label>Notes</label>
<textarea id="notes"></textarea>

<button onclick="saveTest()">Save Reading</button>
</div>

<script>
const params = [
{id:'alk',name:'Alkalinity',unit:'dKH'},
{id:'calcium',name:'Calcium',unit:'ppm'},
{id:'mag',name:'Magnesium',unit:'ppm'},
{id:'nitrate',name:'Nitrate',unit:'ppm'},
{id:'phosphate',name:'Phosphate',unit:'ppm'}
];

function renderFields(){
const container=document.getElementById('testFields');
container.innerHTML = params.map(p=>`
<div>
<label>${p.name}</label>
<input id="${p.id}" type="number" placeholder="${p.name}">
</div>
`).join('');
}

function saveTest(){
let data = {};
params.forEach(p=>{
let val=document.getElementById(p.id).value;
if(val) data[p.id]=val;
});
alert("Saved: " + JSON.stringify(data));
}

renderFields();
</script>

</body>
</html>
